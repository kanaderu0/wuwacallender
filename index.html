<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="script.js"></script>
    <style>
      /* cssリセット */
      *{
        margin: 0;
        padding: 0;
      }
      /* 背景を動かさないために body を固定 */
      body{
        width: 100%;
        height: 100vh;
      }
      /* コンテンツだけスクロールさせる */
      #content{
        position: relative;
        height: 100vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      #content::-webkit-scrollbar {
        display: none; /* Chrome, Safari, Edge */
      }
      #bg-iframe{
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* 背景に配置 */
        pointer-events: none;
      }
      /* 上に置くコンテンツ */
      h1,#nowyear{
        z-index: 1;
      }
      h1,h2 {
        font-size: 30px;
        color: #0094ff;
      }
      h1{
        position: fixed;
        font-size: clamp(18px, 2vw, 22px);
        bottom: 15px;
        right: 80px;
      }
      @media screen and (max-width: 768px){
        h1{
          bottom: 10px;
          right: 10px;
        }
      }
      h2{
        margin-top: 100px;
        font-size: clamp(30px, 3vw, 50px);
        text-align: center;
        color: #0094ff;
      }
      /* PC用 */
      #nowyear{
        position: fixed;
        font-size: clamp(30px, 4vw, 40px);
        font-weight: bold;
        top: 5px;
        left: 20px;
        color: #0094ff;
      }
      /* PC用 */
      .month{
        font-size: clamp(50px, 6vw, 70px);
        padding-right: 0.15em;
      }
      #margin{
        margin-bottom: 100px;
      }
      table{ 
        background-color: rgba(255, 255, 255, 0.5);
        table-layout: fixed;
        border-collapse: collapse;
        width: 90%;
        height: calc(var(--vh) * 70);
        margin: 20px auto 70px auto;
      } 
      table tr{
        height: calc(var(--vh) * 70 / 6);
      }
      th{
        font-weight: bold;
        font-size: 24px;
      }
      td{
        font-size: 28px;
        text-align: center;
        border: 1px solid #cccccc;
        border-radius: 5px;
      }
      .red {
        color: red;
      }
      tr:nth-child(0) {
        font-weight: bold;
      }
      td:first-child {
        color: red;
      }
      .calendar .sun {
        color: red;
      }
      .calendar .mute{
        visibility: hidden;
      }
      .calendar #today {
        background-color: white;
      }
    </style>
  </head>
  <body>
    <p id="nowyear"></p>
    <h1>鳴潮カレンダー</h1>
    <div id="content">
      <div id="margin"></div>
      <div id="calendar" class="calendar-wrap">
    </div>
  </body>
</html>
